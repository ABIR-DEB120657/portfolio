<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar">

    <style>
        /* ═══════════════════════════════════════
           NAVBAR VARIABLES
           ═══════════════════════════════════════ */
        :root {
            --nav-h:    64px;
            --nav-ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ═══════════════════════════════════════
           SITE HEADER — DARK (default)
           ═══════════════════════════════════════ */
        .site-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 9999;
            height: var(--nav-h);
            background: rgba(13, 17, 23, 0.80);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition:
                    background   0.40s var(--nav-ease),
                    border-color 0.35s var(--nav-ease),
                    box-shadow   0.35s var(--nav-ease);
        }
        .site-header.scrolled {
            background: rgba(13, 17, 23, 0.97);
            border-bottom-color: rgba(16, 185, 129, 0.25);
            box-shadow: 0 4px 28px rgba(0, 0, 0, 0.50);
        }

        /* ═══════════════════════════════════════
           SITE HEADER — LIGHT THEME OVERRIDE
           ═══════════════════════════════════════ */
        [data-theme="light"] .site-header {
            background: rgba(246, 248, 250, 0.85) !important;
            border-bottom-color: rgba(0, 0, 0, 0.10);
        }
        [data-theme="light"] .site-header.scrolled {
            background: rgba(246, 248, 250, 0.97) !important;
            border-bottom-color: rgba(5, 150, 105, 0.30);
            box-shadow: 0 4px 28px rgba(0, 0, 0, 0.12);
        }

        /* ═══════════════════════════════════════
           SCROLL PROGRESS BAR
           ═══════════════════════════════════════ */
        .nav-progress {
            position: absolute;
            bottom: 0; left: 0;
            height: 2px;
            width: 0%;
            background: var(--accent, #10b981);
            border-radius: 0 2px 2px 0;
            z-index: 10;
            transition: width 0.10s linear;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.50);
        }

        /* ═══════════════════════════════════════
           BORDER GLOW
           ═══════════════════════════════════════ */
        .nav-border-glow {
            position: absolute;
            bottom: -1px; left: 8%; right: 8%;
            height: 1px;
            pointer-events: none;
            opacity: 0;
            border-radius: 50%;
            background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(16, 185, 129, 0.50),
                    rgba(16, 185, 129, 0.30),
                    transparent
            );
            transition: opacity 0.45s ease;
        }
        .site-header.scrolled .nav-border-glow { opacity: 1; }

        /* ═══════════════════════════════════════
           CONTAINER + NAVBAR FLEX
           ═══════════════════════════════════════ */
        .site-header .container {
            max-width: 1220px;
            margin: 0 auto;
            padding: 0 32px;
            height: 100%;
        }
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            gap: 16px;
        }

        /* ═══════════════════════════════════════
           BRAND / LOGO  — < Abir />
           ═══════════════════════════════════════ */
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0;
            text-decoration: none;
            flex-shrink: 0;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 1.05rem;
            font-weight: 600;
            color: #e6edf3;
            letter-spacing: -0.02em;
            transition: opacity 0.2s ease;
        }
        .nav-brand:hover { opacity: 0.85; color: #e6edf3; }

        [data-theme="light"] .nav-brand       { color: #1c2128; }
        [data-theme="light"] .nav-brand:hover { color: #1c2128; }

        .logo-bracket { color: #10b981; font-weight: 700; }
        .logo-name    { color: #e6edf3; margin: 0 2px; }

        [data-theme="light"] .logo-name { color: #1c2128; }

        /* Status dot */
        .brand-status-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #10b981;
            margin-left: 8px;
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.70);
            animation: status-pulse 2.4s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes status-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.80); }
        }

        /* ═══════════════════════════════════════
           NAV MENU — desktop
           ═══════════════════════════════════════ */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            justify-content: center;
        }

        /* ═══════════════════════════════════════
           LINKS WRAPPER + SLIDING INDICATOR
           ═══════════════════════════════════════ */
        .nav-links-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .nav-indicator {
            position: absolute;
            bottom: -6px;
            height: 2px;
            border-radius: 2px;
            pointer-events: none;
            opacity: 0;
            background: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.60);
            transition:
                    left    0.36s var(--nav-ease),
                    width   0.36s var(--nav-ease),
                    opacity 0.24s ease;
        }

        /* ═══════════════════════════════════════
           NAV LINKS
           ═══════════════════════════════════════ */
        .nav-links {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 2px;
            margin: 0; padding: 0;
        }
        .nav-links a {
            display: flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            color: #8b949e;
            letter-spacing: 0.01em;
            white-space: nowrap;
            position: relative;
            transition: color 0.22s ease, background 0.22s ease;
        }
        .nav-links a:hover {
            color: #e6edf3;
            background: rgba(255, 255, 255, 0.05);
        }
        .nav-links a.active {
            color: #10b981;
            background: rgba(16, 185, 129, 0.08);
        }
        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -6px; left: 50%;
            transform: translateX(-50%);
            width: 20px; height: 2px;
            background: #10b981;
            border-radius: 2px;
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.60);
        }

        /* Light theme — nav links */
        [data-theme="light"] .nav-links a {
            color: #57606a;
        }
        [data-theme="light"] .nav-links a:hover {
            color: #1c2128;
            background: rgba(0, 0, 0, 0.05);
        }
        [data-theme="light"] .nav-links a.active {
            color: #059669;
            background: rgba(5, 150, 105, 0.08);
        }
        [data-theme="light"] .nav-links a.active::after {
            background: #059669;
        }
        [data-theme="light"] .nav-indicator {
            background: #059669;
        }

        /* ═══════════════════════════════════════
           NAV ACTION AREA
           ═══════════════════════════════════════ */
        .nav-action {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        /* ═══════════════════════════════════════
           THEME TOGGLE BUTTON
           ═══════════════════════════════════════ */
        .theme-toggle-btn {
            width: 36px; height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1c2128;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #8b949e;
            cursor: pointer;
            transition: all 0.22s ease;
            flex-shrink: 0;
            font-size: 1rem;
        }
        .theme-toggle-btn:hover {
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.40);
            background: rgba(16, 185, 129, 0.08);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.15);
        }
        /* SVG icon inside */
        .theme-toggle-btn svg {
            width: 16px; height: 16px;
            flex-shrink: 0;
        }
        /* FontAwesome <i> icon inside */
        .theme-toggle-btn i {
            font-size: 15px;
            line-height: 1;
        }

        /* Light theme toggle button */
        [data-theme="light"] .theme-toggle-btn {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.10);
            color: #57606a;
        }
        [data-theme="light"] .theme-toggle-btn:hover {
            color: #059669;
            border-color: rgba(5, 150, 105, 0.40);
            background: rgba(5, 150, 105, 0.08);
        }

        /* ═══════════════════════════════════════
           HIRE ME BADGE
           ═══════════════════════════════════════ */
        .hire-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.025em;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            color: #10b981;
            background: rgba(16, 185, 129, 0.10);
            border: 1px solid rgba(16, 185, 129, 0.30);
            transition: all 0.24s ease;
        }
        .hire-badge:hover {
            background: #10b981;
            color: #0d1117;
            border-color: #10b981;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.30);
        }
        .hire-badge::before {
            content: '';
            position: absolute;
            top: 0; left: -85%;
            width: 55%; height: 100%;
            background: linear-gradient(105deg, transparent 38%, rgba(255,255,255,0.22) 50%, transparent 62%);
            transition: left 0.52s ease;
            pointer-events: none;
        }
        .hire-badge:hover::before { left: 145%; }

        /* Light theme hire badge */
        [data-theme="light"] .hire-badge {
            color: #059669;
            background: rgba(5, 150, 105, 0.08);
            border-color: rgba(5, 150, 105, 0.30);
        }
        [data-theme="light"] .hire-badge:hover {
            background: #059669;
            color: #ffffff;
            border-color: #059669;
        }

        .hire-pulse-ring {
            position: absolute; inset: -1px;
            border-radius: 8px;
            border: 1px solid rgba(16, 185, 129, 0.35);
            animation: hire-ring 2.6s ease-out infinite;
            pointer-events: none;
        }
        @keyframes hire-ring {
            0%   { transform: scale(1);    opacity: 0.85; }
            65%  { transform: scale(1.08); opacity: 0; }
            100% { transform: scale(1.08); opacity: 0; }
        }
        .hire-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.80);
            flex-shrink: 0;
            animation: hire-dot-p 2.1s ease-in-out infinite;
        }
        @keyframes hire-dot-p {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.40); }
        }
        .hire-icon { font-size: 11px; }

        /* ═══════════════════════════════════════
           HAMBURGER — mobile
           ═══════════════════════════════════════ */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: background 0.22s ease;
        }
        .hamburger:hover { background: rgba(255, 255, 255, 0.05); }
        .hamburger span {
            display: block;
            height: 2px;
            border-radius: 2px;
            background: #8b949e;
            transition: transform 0.32s var(--nav-ease), opacity 0.24s ease;
        }
        .hamburger span:nth-child(1) { width: 22px; }
        .hamburger span:nth-child(2) { width: 16px; }
        .hamburger span:nth-child(3) { width: 22px; }
        .hamburger:hover span        { background: #10b981; }
        .hamburger.active span:nth-child(1) { transform: translateY(7px)  rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; transform: translateX(-6px); }
        .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* Light theme hamburger */
        [data-theme="light"] .hamburger span   { background: #57606a; }
        [data-theme="light"] .hamburger:hover  { background: rgba(0, 0, 0, 0.05); }

        /* ═══════════════════════════════════════
           MOBILE DROPDOWN
           ═══════════════════════════════════════ */
        @media (max-width: 900px) {
            .hamburger { display: flex; }
            .nav-indicator { display: none !important; }

            .nav-menu {
                position: absolute;
                top: calc(var(--nav-h) + 8px);
                left: 12px; right: 12px;
                flex-direction: column;
                align-items: stretch;
                justify-content: flex-start;
                gap: 8px;
                padding: 16px;
                border-radius: 12px;
                background: #161b22;
                border: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
                z-index: 9998;
                opacity: 0;
                transform: translateY(-10px);
                visibility: hidden;
                pointer-events: none;
                transition: opacity 0.28s ease, transform 0.28s ease, visibility 0.28s ease;
            }
            .nav-menu.active {
                opacity: 1;
                transform: translateY(0);
                visibility: visible;
                pointer-events: auto;
            }

            /* Light theme — mobile dropdown */
            [data-theme="light"] .nav-menu {
                background: #ffffff;
                border-color: rgba(0, 0, 0, 0.10);
                box-shadow: 0 16px 48px rgba(0, 0, 0, 0.15);
            }

            .nav-links-wrapper { width: 100%; }
            .nav-links {
                flex-direction: column;
                gap: 2px; width: 100%;
            }
            .nav-links a {
                padding: 10px 14px;
                border-radius: 8px;
                font-size: 0.92rem;
                width: 100%;
            }
            .nav-links a.active::after { display: none; }
            .nav-links a.active {
                border-left: 2px solid #10b981;
                padding-left: 12px;
            }
            [data-theme="light"] .nav-links a.active {
                border-left-color: #059669;
            }
            .nav-action {
                padding-top: 8px;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                justify-content: center;
            }
            [data-theme="light"] .nav-action {
                border-top-color: rgba(0, 0, 0, 0.08);
            }
        }

        /* ═══ RADIAL QUICK-NAV ═══ */
        @property --tA { syntax: '<angle>'; inherits: false; initial-value: 0deg; }
        @property --curAngle { syntax: '<angle>'; inherits: false; initial-value: 0deg; }
        @property --curRadius { syntax: '<length>'; inherits: false; initial-value: 0px; }
        @property --curScale { syntax: '<number>'; inherits: false; initial-value: 0; }

        .radial-nav {
            position: fixed;
            bottom: 90px; right: 90px;
            z-index: 9997;
            width: 52px; height: 52px;
        }
        .menu-toggle-input {
            position: absolute;
            opacity: 0; pointer-events: none;
        }
        .toggle-btn {
            position: absolute;
            top: 50%; left: 50%;
            width: 52px; height: 52px;
            margin: -26px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #34d399, #10b981 60%, #059669);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 0 18px rgba(16,185,129,0.55), 0 0 40px rgba(16,185,129,0.25);
            transition: box-shadow .3s ease;
            border: none;
        }
        .toggle-btn::before {
            content: '';
            position: absolute; inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from var(--tA), #34d399, #10b981, transparent 60%, #34d399);
            z-index: -1;
            animation: rn-spin 4s linear infinite;
        }
        @keyframes rn-spin { to { --tA: 360deg; } }
        @keyframes rn-btnSpin { to { rotate: 360deg; } }

        .menu-toggle-input:checked ~ .toggle-btn {
            animation: rn-btnSpin 9s linear infinite;
            box-shadow: 0 0 26px rgba(16,185,129,0.85), 0 0 60px rgba(16,185,129,0.4);
        }
        .bar {
            position: absolute;
            background: #0d1117;
            border-radius: 2px;
            transition: transform .35s cubic-bezier(.65,0,.35,1);
        }
        .bar-v { width: 3px; height: 20px; }
        .bar-h { width: 20px; height: 3px; }
        .menu-toggle-input:checked ~ .toggle-btn .bar-v { transform: rotate(90deg); }
        .menu-toggle-input:checked ~ .toggle-btn .bar-h { transform: rotate(180deg); }

        .rn-orbit { position: absolute; inset: 0; }

        .ray {
            position: absolute;
            top: 50%; left: 50%;
            width: 120px; height: 2px;
            background: linear-gradient(90deg, var(--c), transparent);
            transform-origin: 0 50%;
            transform: rotate(var(--angle)) scaleX(0);
            opacity: 0; pointer-events: none;
        }
        @keyframes rayFlash {
            0%   { transform: rotate(var(--angle)) scaleX(0); opacity: 0; }
            35%  { transform: rotate(var(--angle)) scaleX(1); opacity: .8; }
            100% { transform: rotate(var(--angle)) scaleX(1); opacity: 0; }
        }
        .menu-toggle-input:checked ~ .rn-orbit .ray {
            animation: rayFlash .6s cubic-bezier(.22,1,.36,1) forwards;
            animation-delay: var(--d, 0s);
        }

        .orbit-item {
            position: absolute;
            top: 50%; left: 50%;
            width: 42px; height: 42px;
            margin: -21px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            --curAngle: 0deg; --curRadius: 0px; --curScale: 0;
            transform: rotate(var(--curAngle)) translateX(var(--curRadius)) rotate(calc(-1 * var(--curAngle))) scale(var(--curScale));
            opacity: var(--curScale);
            transition:
                    --curAngle .5s cubic-bezier(.22,1,.36,1),
                    --curRadius .55s cubic-bezier(.34,1.56,.64,1),
                    --curScale .45s cubic-bezier(.34,1.56,.64,1);
            transition-delay: var(--d, 0s);
        }
        .menu-toggle-input:checked ~ .rn-orbit .orbit-item {
            --curAngle: var(--angle);
            --curRadius: 75px;
            --curScale: 1;
        }
        .diamond {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background:
                    linear-gradient(#0b0f18, #0b0f18) padding-box,
                    conic-gradient(var(--c), transparent 40%, var(--c)) border-box;
            border: 2px solid transparent;
            border-radius: 8px;
            transform: rotate(45deg);
            box-shadow: 0 0 12px color-mix(in srgb, var(--c) 50%, transparent);
            transition: box-shadow .25s ease, transform .25s ease;
        }
        [data-theme="light"] .diamond {
            background:
                    linear-gradient(#ffffff, #ffffff) padding-box,
                    conic-gradient(var(--c), transparent 40%, var(--c)) border-box;
        }
        @keyframes breathe {
            0%,100% { box-shadow: 0 0 12px color-mix(in srgb, var(--c) 50%, transparent); }
            50%      { box-shadow: 0 0 22px color-mix(in srgb, var(--c) 80%, transparent); }
        }
        .menu-toggle-input:checked ~ .rn-orbit .orbit-item .diamond {
            animation: breathe 3s ease-in-out infinite;
        }
        .orbit-item:hover .diamond {
            transform: rotate(45deg) scale(1.15);
        }
        .rn-icon {
            width: 16px; height: 16px;
            transform: rotate(-45deg);
            stroke: var(--c); fill: none;
            stroke-width: 1.8;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .rn-label {
            position: absolute;
            bottom: -18px; left: 50%;
            transform: translateX(-50%);
            font-family: 'Fira Code', monospace;
            font-size: 0.55rem;
            color: var(--c);
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .orbit-item:hover .rn-label { opacity: 1; }

        .ray:nth-of-type(1), .orbit-item:nth-child(1) { --d: .00s; }
        .ray:nth-of-type(2), .orbit-item:nth-child(2) { --d: .04s; }
        .ray:nth-of-type(3), .orbit-item:nth-child(3) { --d: .08s; }
        .ray:nth-of-type(4), .orbit-item:nth-child(4) { --d: .12s; }
        .ray:nth-of-type(5), .orbit-item:nth-child(5) { --d: .08s; }
        .ray:nth-of-type(6), .orbit-item:nth-child(6) { --d: .04s; }

        @media (max-width: 900px) {
            .radial-nav { bottom: 18px; right: 18px; }
        }
        @media (max-width: 480px) {
            .site-header .container { padding: 0 16px; }
        }
    </style>

    <header class="site-header" id="site-header">

        <!-- ── Scroll Progress Bar ── -->
        <div class="nav-progress" id="nav-progress"></div>

        <!-- ── Green Border Glow ── -->
        <div class="nav-border-glow"></div>

        <div class="container">
            <div class="navbar">

                <!-- ══ BRAND / LOGO  < Abir /> ══ -->
                <a th:href="@{/home}" class="nav-brand" href="/home">
                    <span class="logo-bracket">&lt;&nbsp;</span>
                    <span class="logo-name">Abir</span>
                    <span class="logo-bracket">&nbsp;/&gt;</span>
                    <span class="brand-status-dot" title="Available for work"></span>
                </a>

                <!-- ══ NAV LINKS + ACTIONS (Desktop) ══ -->
                <div class="nav-menu" id="nav-menu">

                    <!-- Center links -->
                    <div class="nav-links-wrapper">
                        <span class="nav-indicator" id="nav-indicator"></span>
                        <ul class="nav-links" id="nav-links-list">
                            <li>
                                <a th:href="@{/}" href="/">Cover</a>
                            </li>
                            <li>
                                <a th:href="@{/home}"
                                   th:classappend="${currentPage == 'home'} ? 'active' : ''"
                                   href="/home">Home</a>
                            </li>
                            <li>
                                <a th:href="@{/about}"
                                   th:classappend="${currentPage == 'about'} ? 'active' : ''"
                                   href="/about">About</a>
                            </li>
                            <li>
                                <a th:href="@{/skills}"
                                   th:classappend="${currentPage == 'skills'} ? 'active' : ''"
                                   href="/skills">Skills</a>
                            </li>
                            <li>
                                <a th:href="@{/projects}"
                                   th:classappend="${currentPage == 'projects'} ? 'active' : ''"
                                   href="/projects">Projects</a>
                            </li>
                            <li>

    <!-- ════════════════════════════════════════════
         NAVBAR SCRIPT — Scroll + Indicator + Mobile + Theme
         ════════════════════════════════════════════ -->
    <script>
        (function () {
            'use strict';

            /* ══════════════════════════════════════
               1. THEME — localStorage থেকে load করে
                  icon update করে — script.js load
                  হওয়ার আগেও সঠিক icon দেখাবে
               ══════════════════════════════════════ */
            var themeIcon = document.getElementById('theme-icon');

            function applyThemeIcon(theme) {
                if (!themeIcon) return;
                themeIcon.className = (theme === 'light')
                    ? 'fa-solid fa-sun'
                    : 'fa-solid fa-moon';
            }

            /* Page load এ saved theme থেকে icon set করো */
            var savedTheme = localStorage.getItem('portfolio-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            applyThemeIcon(savedTheme);

            /* Theme toggle button click */
            var toggleBtn = document.getElementById('theme-toggle');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function () {
                    var current = document.documentElement.getAttribute('data-theme');
                    var next    = (current === 'dark') ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('portfolio-theme', next);
                    applyThemeIcon(next);
                });
            }

            /* ══════════════════════════════════════
               2. SCROLL PROGRESS + SCROLLED STATE
               ══════════════════════════════════════ */
            var progressBar = document.getElementById('nav-progress');
            var header      = document.getElementById('site-header');
            var ticking     = false;

            function updateScrollState() {
                var scrollTop = window.scrollY || window.pageYOffset;
                var docHeight = document.documentElement.scrollHeight - window.innerHeight;
                var progress  = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;

                if (progressBar) progressBar.style.width = progress.toFixed(2) + '%';
                if (header) header.classList.toggle('scrolled', scrollTop > 30);
                ticking = false;
            }

            window.addEventListener('scroll', function () {
                if (!ticking) {
                    requestAnimationFrame(updateScrollState);
                    ticking = true;
                }
            }, { passive: true });
            updateScrollState();

            /* ══════════════════════════════════════
               3. SLIDING ACTIVE INDICATOR
               ══════════════════════════════════════ */
            var indicator  = document.getElementById('nav-indicator');
            var navWrapper = indicator ? indicator.parentElement : null;

            function moveIndicator(targetEl, animated) {
                if (!indicator || !navWrapper || !targetEl) return;
                var tRect = targetEl.getBoundingClientRect();
                var wRect = navWrapper.getBoundingClientRect();
                var left  = tRect.left - wRect.left;

                if (!animated) {
                    indicator.style.transition = 'none';
                    indicator.style.opacity    = '0';
                }
                indicator.style.left  = left + 'px';
                indicator.style.width = tRect.width + 'px';

                if (!animated) {
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            indicator.style.transition = '';
                            indicator.style.opacity    = '1';
                        });
                    });
                } else {
                    indicator.style.opacity = '1';
                }
            }

            function resetToActive() {
                var active = document.querySelector('.nav-links a.active');
                if (active && indicator) {
                    moveIndicator(active, true);
                } else if (indicator) {
                    indicator.style.opacity = '0';
                }
            }

            document.querySelectorAll('.nav-links a').forEach(function (link) {
                link.addEventListener('mouseenter', function () { moveIndicator(link, true); });
            });
            if (navWrapper) {
                navWrapper.addEventListener('mouseleave', resetToActive);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', resetToActive);
            } else {
                resetToActive();
            }
            setTimeout(resetToActive, 350);
            window.addEventListener('resize', resetToActive, { passive: true });

            /* ══════════════════════════════════════
               4. HAMBURGER MOBILE TOGGLE
               ══════════════════════════════════════ */
            var hamburger = document.getElementById('hamburger');
            var navMenu   = document.getElementById('nav-menu');

            if (hamburger && navMenu) {
                hamburger.addEventListener('click', function () {
                    var isActive = hamburger.classList.toggle('active');
                    navMenu.classList.toggle('active', isActive);
                    hamburger.setAttribute('aria-expanded', isActive.toString());
                });

                document.querySelectorAll('.nav-links a').forEach(function (link) {
                    link.addEventListener('click', function () {
                        hamburger.classList.remove('active');
                        navMenu.classList.remove('active');
                        hamburger.setAttribute('aria-expanded', 'false');
                    });
                });

                document.addEventListener('click', function (e) {
                    if (!hamburger.contains(e.target) && !navMenu.contains(e.target)) {
                        hamburger.classList.remove('active');
                        navMenu.classList.remove('active');
                        hamburger.setAttribute('aria-expanded', 'false');
                    }
                });
            }


        })();
    </script>
